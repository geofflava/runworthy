name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gitleaks 8.30.1 (pinned)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | sudo tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Install osv-scanner 2.4.0 (pinned)
        run: |
          sudo curl -sSL -o /usr/local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64
          sudo chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Install SkillSpector 2.3.9 (pinned to release commit)
        run: |
          pipx install "git+https://github.com/NVIDIA/skillspector.git@dde36f258729b5aec7c835295a9556e64a2def0c"
          skillspector --version

      - name: Install runworthy
        # [llm] pulls anthropic + langgraph so the interpretation and eval suites
        # run here. The eval suite replays recorded cassettes — no API key needed.
        run: pip install -e ".[dev,llm]"

      - name: Verify detector toolchain
        run: runworthy doctor

      - name: Run tests
        run: pytest -q

      - name: Verify schemas are in sync
        run: |
          python -m runworthy.schema_export schemas
          git diff --exit-code schemas/ || (echo "schemas out of date — run: python -m runworthy.schema_export schemas" && exit 1)
